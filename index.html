<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet"> 
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="shortcut icon" type="image/x-icon" href="assets/images/logopupr.png" />
    <title>Admin Panel BPLJ</title>
</head>

<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo"> 
                <img src="assets/images/Logo bplj.png" alt="Logo"> <!-- Placeholder for logo image -->
            </div>
            <h2 class="h2-sign">Sign in Admin Panel</h2>
            <form id="loginForm" onsubmit="return validateForm()">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" required>
                
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
                
                <div class="options">
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>
                
                <button type="button" class="button-sign-in" onclick="window.location.href='pages/dashboard.html'">Sign In</button>
            </form>
            <p class="signup-text">I don't have an account? <a href="#">Sign up</a></p>
            <!-- <div class="ilustrasi">
            <img src="assets/Ilustrasi.png" alt="ilustrasi">
        </div> -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
